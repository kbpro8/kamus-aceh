  - meaning_id: "permainan tradisional Aceh mirip catur yg dimainkan oleh dua orang pd sebilah papan, pd titik pertemuan garis vertikal dan horizontal diletakan masing-masing satu bidak catur, jumlah bidak bervariasi mulai 28, 81, dan 100, bidak yg digunakan berasal dari batu atau kulit lokan, bidak yg besar disebut rimung dan yg kecil disebut kameng, pemegang rimung menang apabila dapat menghabiskan kameng, pemegang kameng menang apabila dapat mengurung rimung sehingga tidak dapat bergerak lagi"
