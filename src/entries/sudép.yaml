  - meaning_id: "2 alat untuk menambal tikar yg sobek, terbuat dari bambu yg dipotong kecil sekitar 1 x 15 cm, bagian ujung dipipihkan, bagian pangkalnya dibelah untuk memasukkan potongan daun pandan kering;"
