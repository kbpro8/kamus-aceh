headword: "lon"
ipa: "/lon/"
part_of_speech: "kata ganti"
definitions:
  - meaning_id: "saya; aku (kata ganti orang pertama tunggal)"
    meaning_en: "I; me (first-person singular pronoun)"
examples:
  - aceh: "Lon kheun nyan bak droeneuh."
    id: "Saya katakan itu kepada Anda."
    en: "I said that to you."
  - aceh: "Lon hana teuingat."
    id: "Saya tidak ingat."
    en: "I don't remember."
dialect_notes: "Dalam dialek pesisir utara juga dikenal bentuk 'lôn'. Digunakan dalam konteks formal maupun informal."
source: "Kamus Aceh–Indonesia, Pusat Bahasa 2001"
date_added: "2025-01-01"
contributor: "Tim Kamus Aceh (contoh)"
