  - meaning_id: "permainan kapal-kapalan dr kain sarung dsb yg dapat menutupi badan sambil berjongkok, terdiri atas 5-6 pemain, pemain pertama harus menebak satu per satu lawan yg bersembunyi di bawah kain sarung, boleh menggunakan bantuan tiga pertanyaan untuk mengenali suara tokoh, pertanyaan pertama pu kapai nyo? kapai Inggreh (kapal apa ini? kapal Inggris), pertanyaan kedua, peu jipeuding? ate tapeh (membawa apa? tapis) dan pertanyaan ketiga, ci kuuk sigo! kuuuuk uk (coba berkokok sekali! kuuu uk), penebak tidak harus menggunakan ketiga bantuan, sepanjang sudah yakin pd tebakannya"
